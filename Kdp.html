<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Boy's Big Adventures — Colored Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF9F0;
    --navy:#2B2D42;
    --sky:#A8D8EA;
    --sun:#FFD34E;
    --coral:#FF9AA2;
    --mint:#B7E4C7;
    --card:#FFFFFF;
    --line:#2B2D42;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:var(--cream);
    font-family:'Nunito', sans-serif;
    color:var(--navy);
  }

  /* ---------- Header ---------- */
  .hero{
    position:relative;
    padding:56px 20px 72px;
    text-align:center;
    overflow:hidden;
    background:
      radial-gradient(circle at 15% 20%, var(--sky) 0, transparent 40%),
      radial-gradient(circle at 85% 15%, var(--coral) 0, transparent 35%),
      radial-gradient(circle at 50% 90%, var(--sun) 0, transparent 30%);
  }
  .hero h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:clamp(28px, 5vw, 46px);
    margin:0 0 8px;
    letter-spacing:0.5px;
  }
  .hero p{
    font-size:17px;
    max-width:520px;
    margin:0 auto;
    opacity:0.85;
  }
  .badge{
    display:inline-block;
    margin-top:18px;
    padding:6px 18px;
    background:var(--navy);
    color:#fff;
    border-radius:999px;
    font-family:'Baloo 2', sans-serif;
    font-size:14px;
    letter-spacing:0.5px;
  }
  .stars{
    position:absolute;
    font-size:22px;
    opacity:0.5;
  }
  .s1{ top:20px; left:8%; }
  .s2{ top:60px; right:10%; }
  .s3{ bottom:20px; left:20%; }

  /* ---------- Grid ---------- */
  .wrap{
    max-width:1100px;
    margin:0 auto;
    padding:36px 20px 80px;
  }
  .grid{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:40px;
  }
  .card{
    background:var(--card);
    border:3px solid var(--line);
    border-radius:18px;
    overflow:hidden;
    box-shadow:6px 6px 0 rgba(43,45,66,0.08);
    width:100%;
    max-width:650px;
  }

  .num{
    position:absolute;
    margin:10px;
    width:30px; height:30px;
    background:var(--sun);
    border:2.5px solid var(--line);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:14px;
    z-index:2;
  }
  .thumb-box{
    position:relative;
    aspect-ratio:8.5/11;
    background:repeating-linear-gradient(45deg, #f2f2f2, #f2f2f2 10px, #ffffff 10px, #ffffff 20px);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .thumb-box img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
  }
  .placeholder{
    text-align:center;
    color:#9a9a9a;
    font-size:13px;
    padding:10px;
  }
  .placeholder svg{ width:38px; height:38px; margin-bottom:6px; opacity:0.6; }

  .caption{
    padding:12px 14px 16px;
    text-align:center;
  }
  .caption .title{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:15px;
    margin:0;
  }
  .caption .hint{
    font-size:12px;
    color:#9a9a9a;
    margin-top:4px;
  }

  footer{
    text-align:center;
    padding:30px 20px 50px;
    font-size:13px;
    color:#9a9a9a;
  }
</style>
</head>
<body>

  <div class="hero">
    <span class="stars s1">⭐</span>
    <span class="stars s2">☁️</span>
    <span class="stars s3">⭐</span>
    <h1>Little Boy's Big Adventures</h1>
    <p>Thanks for coloring with us! Here's how every page can look when it's finished — use them for ideas or just to compare with your own masterpiece.</p>
    <div class="badge">🎨 Colored Reference Gallery</div>
  </div>

  <div class="wrap">
    <div class="grid" id="gallery"></div>
  </div>

  <footer>Made with ❤️ for young artists everywhere</footer>

<script>
/* ============================================================
   HOW TO ADD YOUR IMAGES
   ------------------------------------------------------------
   1. Put your colored images in an "images" folder next to
      this HTML file (create the folder if it doesn't exist).
   2. Name them anything you like, then update the "img" value
      below for that entry — e.g. "images/superhero.png"
   3. Replace "title" with the real name of that page.
   4. Until you add a real image, the card will automatically
      show a placeholder icon — nothing breaks.
   5. Add or remove entries from this list freely; the gallery
      grid updates itself automatically.
   ============================================================ */

const pages = [
  { title: "Test", img: "https://youssef-num1.github.io/little-boy-gallery/(page-3).png" }
  { title: "I'm a Superhero", img: "(page-5).png" },
  { title: "My Space Adventures", img: "(page-7).png" },
  { title: "My cambing Adventure", img: "(page-9).png" },
  { title: "Building A snow Man", img: "(page-11).png" },
  { title: "Sand Castle Fun", img: "(page-13).png" },
  { title: "Sea Animals", img: "(page-15).png" },
  { title: "The happy Fish", img: "(page-17).png" },
  { title: "The Funny Octopus", img: "(page-19).png" },
  { title: "Under The Sea", img: "(page-21).png" },
  { title: "Zoo Animals", img: "(page-23).png" },
  { title: "The Lion King", img: "(page-25).png" },
  { title: "The Zepra", img: "(page-27).png" },
  { title: "The Big Elefant", img: "(page-29).png" },
  { title: "The little Rabbit", img: "(page-31).png" },
  { title: "The Panda", img: "(page-33).png" },
  { title: "A Giraffe And Elephant", img: "(page-35).png" },
  { title: "My Big Garden Day", img: "(page-37).png" },
  { title: "Vechiles", img: "(page-39).png" },
  { title: "Rescue Boat", img: "(page-41).png" },
  { title: "Helicopter", img: "(page-43).png" },
  { title: "Fire Truck", img: "(page-45).png" },
  { title: "Ambulance", img: "(page-47).png" },
  { title: "Police Car", img: "(page-49).png" },
  { title: "Garbage Truck", img: "(page-51).png" },
  { title: "School Bus", img: "(page-53).png" },
  { title: "Certificate", img: "(page-55).png" },

];

const placeholderSVG = `
  <svg viewBox="0 0 24 24" fill="none" stroke="#9a9a9a" stroke-width="1.5">
    <circle cx="12" cy="12" r="9"/>
    <circle cx="9" cy="10" r="1.2" fill="#9a9a9a" stroke="none"/>
    <circle cx="15" cy="10" r="1.2" fill="#9a9a9a" stroke="none"/>
    <path d="M8 15c1.5 1.5 6.5 1.5 8 0"/>
  </svg>`;

const gallery = document.getElementById('gallery');

pages.forEach((page, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.position = 'relative';

  card.innerHTML = `
    <div class="num">${i + 1}</div>
    <div class="thumb-box">
      <img src="${page.img}" alt="${page.title}"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="placeholder" style="display:none; flex-direction:column; align-items:center; justify-content:center;">
        ${placeholderSVG}
        <span>Add image<br>${page.img}</span>
      </div>
    </div>
    <div class="caption">
      <p class="title">${page.title}</p>
<p class="hint">Page ${3 + (i * 2)}</p>
    </div>
  `;
  gallery.appendChild(card);
});
</script>

</body>
</html>
